[runtime]
strategy_id = "alpha-dual-side-grid-bsc-testnet"
mode = "live"
refresh_interval_ms = 1000
rotation_interval_sec = 300
state_store_path = "data/alpha_grid_bsc_testnet.db"
log_level = "info"
allow_live = true
allow_mainnet = false

# Stage 0: testnet write-chain validation
# 1. keep chain_id = 97
# 2. use a funded testnet wallet
# 3. use PancakeSwap testnet router + dummy tokens

[chain]
chain_id = 97
chain_name = "bsc-testnet"
rpc_urls = ["https://data-seed-prebsc-1-s1.bnbchain.org:8545"]
rpc_timeout_sec = 15
wallet_address = "0x0000000000000000000000000000000000000000"
private_key_env = "BSC_TESTNET_ALPHA_PRIVATE_KEY"
explorer_base_url = "https://testnet.bscscan.com"

[router]
kind = "uniswap_v2"
address = "0xD99D1c33F9fC3444f8101754aBC46c52416550D1"
spender_address = "0xD99D1c33F9fC3444f8101754aBC46c52416550D1"
router_abi_path = "abi/uniswap_v2_router.json"
quote_method = "getAmountsOut"
buy_swap_method = "swapExactTokensForTokensSupportingFeeOnTransferTokens"
sell_swap_method = "swapExactTokensForTokensSupportingFeeOnTransferTokens"
approve_max = true
tx_wait_timeout_sec = 120
tx_poll_interval_sec = 2.0

[market]
quote_token_symbol = "BUSD"
quote_token_address = "0x8516Fc284AEEaa0374E66037BD2309349FF728eA"
quote_token_decimals = 18
allowed_route_types = ["amm"]
probe_quote_usd = 1.0
max_price_impact_bps = 250.0
stale_quote_sec = 10

[universe]
mode = "static"
include_symbols = ["CAKE_TESTNET"]
exclude_symbols = []
max_symbols = 1
min_listing_age_hours = 1
min_pool_liquidity_usd = 1.0
min_24h_volume_usd = 1.0
max_token_tax_bps = 500.0
max_drop_pct_5m = 95.0
keep_positions_on_rotation = true

[reference_price]
source = "executable_mid_plus_ema"
ema_alpha = 0.18
mid_weight = 0.55
ema_weight = 0.45
volatility_lookback_sec = 300
volatility_source = "executable_mid"

[grid]
mode = "dynamic"
base_step_bps = 120.0
min_step_bps = 60.0
max_step_bps = 500.0
spread_multiplier = 1.20
volatility_multiplier = 1.50
rebuild_on_fill = true
rebuild_on_reference_change_bps = 35.0
paired_take_profit_bps = 220.0

[[grid.buy_levels]]
level = 1
offset_bps = 120.0
order_quote_usd = 1.0
cooldown_sec = 8

[[grid.sell_levels]]
level = 1
offset_bps = 160.0
order_base_ratio = 0.20
cooldown_sec = 8

[inventory]
target_base_ratio = 0.30
inventory_skew_factor_bps = 450.0
max_inventory_shift_bps = 180.0
reserve_base_tokens = 0.0
max_quote_per_symbol_usd = 20.0
max_base_exposure_usd = 20.0
min_quote_reserve_usd = 0.5
min_sell_base_usd = 0.5
allow_emergency_sell_reserve = false

[execution]
router = "single-router"
deadline_sec = 45
slippage_bps = 120.0
max_gas_gwei = 10.0
replacement_gas_bump_bps = 1250.0
cancel_pending_after_sec = 180
max_gas_usd_per_tx = 1.0
estimated_fee_bps = 0.0
min_net_edge_bps = 5.0
min_expected_profit_usd = -1.0
single_symbol_single_inflight = true
max_inflight_txs = 1
retry_times = 1
retry_backoff_ms = 800

[risk]
kill_switch_file = "run/alpha-grid-testnet.stop"
max_notional_per_order = 2.0
max_position_per_symbol_usd = 10.0
mainnet_buy_enabled = false
mainnet_sell_enabled = false
mainnet_max_notional_per_order = 0.0
mainnet_max_position_per_symbol_usd = 0.0
max_daily_realized_loss_usd = 20.0
max_daily_gas_usd = 5.0
max_consecutive_failed_tx = 3
max_failed_tx_per_symbol = 3
max_trades_per_symbol_per_hour = 20
hard_stop_from_cost_bps = 3000.0
pause_on_liquidity_drop = true
pause_on_honeypot_signal = true
pause_on_route_failure = true

[reporting]
dashboard_refresh_sec = 1
persist_trades = true
persist_quotes = false
recent_log_lines = 10

[simulation]
seed = 7
starting_quote_usd = 5.0
starting_base_units = 0.0
default_drift_bps = 0.0
default_volatility_bps = 80.0
default_spread_bps = 50.0

[symbols.default]
enabled = true

[symbols."CAKE_TESTNET"]
enabled = true

[symbols."CAKE_TESTNET".simulation]
initial_price = 2.0
volatility_bps = 80.0

[symbols."CAKE_TESTNET".route]
base_token_address = "0xFa60D973F7642B748046464e165A65B7323b0DEE"
base_token_decimals = 18
quote_token_address = "0x8516Fc284AEEaa0374E66037BD2309349FF728eA"
quote_token_decimals = 18
buy_path = [
  "0x8516Fc284AEEaa0374E66037BD2309349FF728eA",
  "0xFa60D973F7642B748046464e165A65B7323b0DEE",
]
sell_path = [
  "0xFa60D973F7642B748046464e165A65B7323b0DEE",
  "0x8516Fc284AEEaa0374E66037BD2309349FF728eA",
]
fee_on_transfer = false

# Source references used for this template:
# - BNB Chain official docs for chain_id=97 and public testnet RPC
# - PancakeSwap docs for testnet router and dummy CAKE/BUSD/WBNB environment
# Replace wallet_address with the address derived from $BSC_TESTNET_ALPHA_PRIVATE_KEY before live execution.
